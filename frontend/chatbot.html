<!DOCTYPE html>
<html>

<head>

<title>VisionAI Chatbot</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="navbar">🧠 VisionAI Assistant</div>

<div class="chat-container">

<h2>AI Chatbot</h2>

<div id="chat-box"></div>

<div id="chat-loader">

<p>🧠 AI Thinking...</p>

<div class="progress">
<div id="chat-progress-bar"></div>
</div>

<p id="chat-progress-text">0%</p>

</div>

<div class="chat-input">

<input type="text" id="question" placeholder="Ask something">

<button onclick="ask()">Send</button>

</div>

</div>

<script src="js/chatbot.js"></script>

</body>

</html>
